#:schema node_modules/wrangler/config-schema.json
name = "valor-travel-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-26"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
routes = [
  { pattern = "mcp.valorflights.com", custom_domain = true }
]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "valor-travel-db"
database_id = "ddcb1a3a-dc83-4f49-8ff6-5dab8ebedef4"

[[kv_namespaces]]
binding = "CACHE"
id = "33df4d74e34d4298b5958db7e4dd3ba0"

[durable_objects]
bindings = [
  { name = "MCP_SERVER", class_name = "ValorTravelMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ValorTravelMCP"]

[vars]
AFFILIATE_MARKER = "137906"
BASE_URL = "https://mcp.valorflights.com"
